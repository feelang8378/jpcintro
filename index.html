<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>필랑의 골프 사이언스 - 드라이버 스윙 마스터</title>
    <link rel="stylesheet" href="style.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6865572083825402"
     crossorigin="anonymous"></script>
</head>
<body>

<header>
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()">🌙 Theme Toggle</button>
    <h1>⛳ 필랑의 골프 사이언스</h1>
    <p>최신 스포츠 과학 논문으로 분석하는 드라이버 스윙의 정석</p>
</header>

<div class="container">
    <!-- 프로필 섹션 -->
    <section class="card profile-section">
        <div class="paper-tag">PROFILE</div>
        <h3>안녕하세요, 골프를 사랑하는 '필랑'입니다.</h3>
        <p>
            저는 이론과 실전을 결합하여 가장 효율적인 스윙을 연구하는 골프 매니아입니다. <br>
            이 블로그는 전 세계의 최신 골프 사이언스 논문들을 분석하여, 
            여러분의 비거리를 20m 더 늘려줄 과학적 근거를 제공합니다.
        </p>
    </section>

    <!-- 블로그 포스트 리스트 (논문 기반) -->
    <div id="paper-posts">
        <!-- 10개의 논문 기반 포스트가 여기에 렌더링됩니다 -->
    </div>
</div>

<footer>
    <p>&copy; 2026 Philang's Golf Science Blog. All Rights Reserved.</p>
    <p style="font-size: 0.7rem; color: var(--silver); margin-top: 5px;">본 블로그의 스윙 이론은 최신 스포츠 과학 연구에 근거합니다.</p>
</footer>

<script src="main.js"></script>
</body>
</html>
