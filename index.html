<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조종필 교수님 - 로또 번호 추천 서비스</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <button id="theme-toggle" class="theme-toggle">🌙 다크 모드</button>
    <h1>🍀 조종필 교수님의 행운 발전소</h1>
    <p>공부에 지친 학생들을 위한 소소한 행운 추첨</p>
</header>

<div class="container">
    <section class="lotto-card">
        <h3>오늘의 추천 번호</h3>
        <p>버튼을 눌러 6개의 행운 숫자를 확인하세요!</p>
        
        <div class="ball-container" id="lotto-result">
            <p style="color:#ccc;">번호를 생성해주세요</p>
        </div>

        <button class="lotto-btn" onclick="generateLotto()">번호 추첨하기</button>
    </section>
</div>

<script src="main.js"></script>
</body>
</html>
