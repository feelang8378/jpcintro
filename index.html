<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>조종필 교수님 - 로또 번호 추천 서비스</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <button id="theme-toggle" class="theme-toggle">🌙 다크 모드</button>
    <h1>🍀 조종필 교수님의 행운 발전소</h1>
    <p>공부에 지친 학생들을 위한 소소한 행운 추첨</p>
</header>

<div class="container">
    <section class="lotto-card">
        <h3>오늘의 추천 번호</h3>
        <p>버튼을 눌러 6개의 행운 숫자를 확인하세요!</p>
        
        <div class="ball-container" id="lotto-result">
            <p style="color:#ccc;">번호를 생성해주세요</p>
        </div>

        <button class="lotto-btn" onclick="generateLotto()">번호 추첨하기</button>
    </section>

    <section class="lotto-card inquiry-section" style="margin-top: 2rem;">
        <h3>🤝 제휴 문의</h3>
        <p>조종필 교수님과 함께하고 싶다면 메시지를 남겨주세요.</p>
        <form action="https://formspree.io/f/mqedjzgv" method="POST" class="inquiry-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="성함 또는 단체명" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="이메일 주소" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="문의 내용을 입력해주세요" rows="4" required></textarea>
            </div>
            <button type="submit" class="lotto-btn">문의 보내기</button>
        </form>
    </section>
</div>

<script src="main.js"></script>
</body>
</html>
