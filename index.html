<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조종필 교수님 - 로또 번호 추천 서비스</title>
<style>
    /* 기존 스타일 유지 및 로또 스타일 추가 */
    :root { --main-color: #004a99; --accent-color: #ffd700; }
    body { font-family: 'Pretendard', sans-serif; background-color: #f9f9f9; margin: 0; }
    header { background-color: var(--main-color); color: white; padding: 2rem; text-align: center; }
    .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    
    /* 로또 섹션 스타일 */
    .lotto-card { 
        background: white; padding: 2rem; border-radius: 20px; 
        box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; 
        border: 2px solid var(--main-color);
    }
    .ball-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; min-height: 60px; }
    .ball {
        width: 50px; height: 50px; line-height: 50px; 
        border-radius: 50%; color: white; font-weight: bold; font-size: 1.2rem;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        transition: transform 0.3s;
    }
    .lotto-btn {
        background: var(--main-color); color: white; border: none;
        padding: 15px 30px; font-size: 1.1rem; border-radius: 50px;
        cursor: pointer; font-weight: bold; transition: 0.3s;
    }
    .lotto-btn:hover { transform: scale(1.05); background: #003570; }

    /* 공 색상 분기 */
    .color-1 { background: #fbc400; } /* 1-10 */
    .color-2 { background: #69c8f2; } /* 11-20 */
    .color-3 { background: #ff7272; } /* 21-30 */
    .color-4 { background: #aaaaaa; } /* 31-40 */
    .color-5 { background: #b0d840; } /* 41-45 */
</style>
</head>
<body>

<header>
<h1>🍀 조종필 교수님의 행운 발전소</h1>
<p>공부에 지친 학생들을 위한 소소한 행운 추첨</p>
</header>

<div class="container">
<section class="lotto-card">
    <h3>오늘의 추천 번호</h3>
    <p>버튼을 눌러 6개의 행운 숫자를 확인하세요!</p>
    
    <div class="ball-container" id="lotto-result">
        <p style="color:#ccc;">번호를 생성해주세요</p>
    </div>

    <button class="lotto-btn" onclick="generateLotto()">번호 추첨하기</button>
</section>
</div>

<script>
function generateLotto() {
    const resultContainer = document.getElementById('lotto-result');
    resultContainer.innerHTML = ''; // 이전 번호 초기화
    
    let numbers = [];
    while(numbers.length < 6) {
        let n = Math.floor(Math.random() * 45) + 1;
        if(!numbers.includes(n)) numbers.push(n);
    }
    
    // 숫자 오름차순 정렬
    numbers.sort((a, b) => a - b);

    // 공 만들기
    numbers.forEach(num => {
        const ball = document.createElement('div');
        ball.className = 'ball';
        ball.innerText = num;
        
        // 숫자에 따른 색상 지정
        if (num <= 10) ball.classList.add('color-1');
        else if (num <= 20) ball.classList.add('color-2');
        else if (num <= 30) ball.classList.add('color-3');
        else if (num <= 40) ball.classList.add('color-4');
        else ball.classList.add('color-5');
        
        resultContainer.appendChild(ball);
    });
}
</script>

</body>
</html>
